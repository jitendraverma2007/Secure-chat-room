<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Room</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .box{
      width:380px;
      padding:30px;
      border-radius:16px;
      background:rgba(255,255,255,0.08);
      box-shadow:0 8px 30px rgba(0,0,0,0.3);
      text-align:center;
    }
    input{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      font-size:18px;
      text-align:center;
      letter-spacing:4px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
    button:hover{
      background:#0ea5e9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Join Chat Room</h2>
    <p>Enter 6-digit room code</p>
    <input type="text" id="roomCode" maxlength="6" placeholder="123456">
    <button onclick="joinRoom()">Join Room</button>
  </div>

  <script>
    async function joinRoom() {
      const roomCode = document.getElementById("roomCode").value.trim();

      if (!/^\d{6}$/.test(roomCode)) {
        alert("Enter valid 6-digit room code");
        return;
      }

      const params = new URLSearchParams();
      params.append("room_code", roomCode);

      try {
        const res = await fetch("./joinRoom", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString()
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = "chat.html";
        } else {
          alert(data.message);
        }
      } catch (e) {
        console.error(e);
        alert("Server error");
      }
    }
  </script>
</body>
</html>
