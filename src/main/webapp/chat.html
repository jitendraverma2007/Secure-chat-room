<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure 2-User Chat</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #07152d, #32145f);
      color: white;
    }

    .wrapper {
      display: flex;
      width: 95%;
      max-width: 1300px;
      margin: 20px auto;
      gap: 20px;
      height: 92vh;
    }

    .sidebar {
      width: 300px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    .sidebar h1 {
      margin: 0 0 8px;
      font-size: 42px;
      background: linear-gradient(90deg, #4da3ff, #ff4fd8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub {
      opacity: .85;
      margin-bottom: 25px;
    }

    .profile {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 25px 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #3aa0ff, #ff43da);
    }

    .user-name {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      word-break: break-word;
    }

    .user-email {
      opacity: .8;
      margin-top: 6px;
      font-size: 14px;
      word-break: break-word;
    }

    .mini {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      line-height: 1.8;
      font-size: 15px;
    }

    .logout-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #ff4848, #ff7a18);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.2s ease;
    }

    .logout-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .chat-panel {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    .chat-header {
      padding: 22px 28px;
      background: rgba(255,255,255,0.07);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 28px;
    }

    .header-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-badge {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: bold;
    }

    .online-badge {
      background: rgba(0,255,120,0.12);
      color: #78ffae;
    }

    .offline-badge {
      background: rgba(255, 80, 80, 0.14);
      color: #ff9f9f;
    }

    .room-badge {
      padding: 10px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      color: #d8e8ff;
      font-size: 14px;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px 25px 10px 25px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .bottom-typing-bar {
      min-height: 28px;
      padding: 0 24px 10px 24px;
      color: #9fe8ff;
      font-size: 14px;
      font-style: italic;
      display: flex;
      align-items: center;
    }

    .bottom-typing-bar.active::before {
      content: "●";
      font-size: 10px;
      margin-right: 8px;
      animation: blinkTyping 1s infinite;
    }

    @keyframes blinkTyping {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    .row {
      display: flex;
      max-width: 78%;
    }

    .row.sent {
      align-self: flex-end;
      justify-content: flex-end;
    }

    .row.received {
      align-self: flex-start;
      justify-content: flex-start;
    }

    .bubble {
      padding: 16px 18px 16px;
      border-radius: 20px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.18);
      min-width: 220px;
      position: relative;
      transition: 0.2s ease;
    }

    .bubble:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.24);
    }

    .sent .bubble {
      background: linear-gradient(135deg, #35b7ff, #2e9cff);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .received .bubble {
      background: rgba(255,255,255,0.14);
      color: white;
      border-bottom-left-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .sender {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
      opacity: .96;
      color: rgba(255,255,255,0.95);
      word-break: break-word;
      letter-spacing: 0.2px;
    }

    .message-text {
      font-size: 22px;
      line-height: 1.5;
      font-weight: 700;
      letter-spacing: 0.3px;
      word-break: break-word;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
      margin-bottom: 6px;
    }

    .received .message-text {
      color: #f2f6ff;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .time {
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      font-weight: 500;
    }

    .edited-label {
      font-size: 12px;
      font-style: italic;
      color: rgba(255,255,255,0.78);
    }

    .delivery-status {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      border: none;
      border-radius: 11px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
      box-shadow: 0 5px 14px rgba(0,0,0,0.16);
    }

    .icon-btn:hover {
      transform: scale(1.08);
    }

    .edit-btn {
      background: #ffe082;
      color: #3f2d00;
    }

    .delete-btn {
      background: #ff8a8a;
      color: white;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.07);
    }

    .input-area input {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
    }

    .input-area button {
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      background: #149ce3;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .input-area button:hover {
      background: #0f87c6;
    }

    @media (max-width: 900px) {
      .wrapper {
        flex-direction: column;
        height: auto;
      }

      .sidebar {
        width: 100%;
      }

      .chat-panel {
        min-height: 70vh;
      }

      .row {
        max-width: 90%;
      }

      .message-text {
        font-size: 18px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="sidebar">
      <div>
        <h1>Chat Room</h1>
        <div class="sub">Secure messaging interface</div>

        <div class="profile">
          <div class="avatar" id="avatarLetter">U</div>
          <h2 style="margin:0">Logged In User</h2>
          <div id="userNameText" class="user-name">User Name</div>
          <div id="userEmailText" class="user-email">user@email.com</div>
        </div>

        <div class="mini">
          <div><b>Status:</b> Connected</div>
          <div><b>Mode:</b> Secure Room Chat</div>
          <div><b>Security:</b> Login Verified</div>
          <div><b>Room Code:</b> <span id="roomCodeText">------</span></div>
          <div><b>Other User:</b> <span id="otherUserStatus">Offline</span></div>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="chat-panel">
      <div class="chat-header">
        <h2>My Chat Room</h2>

        <div class="header-right">
          <div class="room-badge">Room: <span id="roomCodeTop">------</span></div>
          <div class="status-badge offline-badge" id="statusBadge">Other User Offline</div>
        </div>
      </div>

      <div class="messages" id="chatMessages"></div>

      <div class="bottom-typing-bar" id="typingIndicator"></div>

      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let currentUserEmail = "";
    let lastMessageCount = 0;
    let lastRenderedMessagesJson = "";
    let heartbeatTimer = null;
    let messageTimer = null;
    let statusTimer = null;
    let typingPollTimer = null;
    let typingStopTimer = null;

    function freshUrl(url) {
      return url + (url.includes("?") ? "&" : "?") + "ts=" + Date.now();
    }

    async function heartbeat() {
      try {
        await fetch(freshUrl("./heartbeat"), {
          method: "POST",
          cache: "no-store"
        });
      } catch (err) {
        console.error(err);
      }
    }

    async function fetchCurrentUser() {
      try {
        const res = await fetch(freshUrl("./currentUser"), {
          cache: "no-store"
        });

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        const data = await res.json();

        currentUserEmail = data.userEmail || "";
        const fullName = data.fullName || currentUserEmail || "Unknown User";
        const roomCode = data.roomCode || "------";

        document.getElementById("userNameText").textContent = fullName;
        document.getElementById("userEmailText").textContent = currentUserEmail || "No Email";
        document.getElementById("avatarLetter").textContent =
          fullName ? fullName.charAt(0).toUpperCase() : "U";

        document.getElementById("roomCodeText").textContent = roomCode;
        document.getElementById("roomCodeTop").textContent = roomCode;
      } catch (err) {
        console.error(err);
      }
    }

    function formatTime(ts) {
      return ts || "";
    }

    function scrollToBottom() {
      const chatMessages = document.getElementById("chatMessages");
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function isNearBottom() {
      const chatMessages = document.getElementById("chatMessages");
      return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 80;
    }

    function updateOtherUserStatus(isOnline) {
      const statusText = document.getElementById("otherUserStatus");
      const badge = document.getElementById("statusBadge");

      if (isOnline) {
        statusText.textContent = "Online";
        badge.textContent = "Other User Online";
        badge.classList.remove("offline-badge");
        badge.classList.add("online-badge");
      } else {
        statusText.textContent = "Offline";
        badge.textContent = "Other User Offline";
        badge.classList.remove("online-badge");
        badge.classList.add("offline-badge");
      }
    }

    async function checkUserStatus() {
      try {
        const res = await fetch(freshUrl("./roomStatus"), {
          cache: "no-store"
        });

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        if (!res.ok) {
          updateOtherUserStatus(false);
          return;
        }

        const data = await res.json();
        const status = (data.otherUserStatus || "").toLowerCase();
        updateOtherUserStatus(status === "online");
      } catch (err) {
        console.error(err);
        updateOtherUserStatus(false);
      }
    }

    async function updateTypingStatus(isTyping) {
      try {
        const params = new URLSearchParams();
        params.append("typing", isTyping ? "true" : "false");

        await fetch(freshUrl("./typingStatus"), {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString(),
          cache: "no-store"
        });
      } catch (err) {
        console.error(err);
      }
    }

    function clearTypingIndicator() {
      const typingBox = document.getElementById("typingIndicator");
      typingBox.textContent = "";
      typingBox.classList.remove("active");
    }

    async function pollTypingStatus() {
      try {
        const res = await fetch(freshUrl("./typingStatus"), {
          cache: "no-store"
        });

        const typingBox = document.getElementById("typingIndicator");

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        if (!res.ok) {
          clearTypingIndicator();
          return;
        }

        const data = await res.json();

        if (data.isTyping) {
          typingBox.textContent = (data.typingUserName || "User") + " is typing...";
          typingBox.classList.add("active");
        } else {
          clearTypingIndicator();
        }
      } catch (err) {
        console.error(err);
        clearTypingIndicator();
      }
    }

    function renderMessage(msg) {
      const chatMessages = document.getElementById("chatMessages");

      const row = document.createElement("div");
      const bubble = document.createElement("div");
      const sender = document.createElement("div");
      const text = document.createElement("div");
      const metaRow = document.createElement("div");
      const time = document.createElement("div");

      const isCurrentUser = msg.sender_email === currentUserEmail;

      row.className = isCurrentUser ? "row sent" : "row received";
      bubble.className = "bubble";
      sender.className = "sender";
      text.className = "message-text";
      metaRow.className = "meta-row";
      time.className = "time";

      sender.textContent = msg.sender_name || msg.sender_email;
      text.textContent = msg.message;
      time.textContent = formatTime(msg.sent_time);

      bubble.appendChild(sender);
      bubble.appendChild(text);
      metaRow.appendChild(time);

      if (msg.edited === true || msg.edited === "true" || msg.edited === 1) {
        const edited = document.createElement("span");
        edited.className = "edited-label";
        edited.textContent = "(edited)";
        metaRow.appendChild(edited);
      }

      if (isCurrentUser) {
        const statusSpan = document.createElement("span");
        statusSpan.className = "delivery-status";

        const ds = (msg.delivery_status || "sent").toLowerCase();
        statusSpan.textContent = ds === "delivered" ? "Delivered" : "Sent";

        metaRow.appendChild(statusSpan);
      }

      bubble.appendChild(metaRow);

      if (isCurrentUser) {
        const actions = document.createElement("div");
        actions.className = "actions";

        const editBtn = document.createElement("button");
        editBtn.className = "icon-btn edit-btn";
        editBtn.title = "Edit Message";
        editBtn.innerHTML = '<i class="fa-solid fa-pen"></i>';
        editBtn.onclick = () => editMessage(msg.msg_id, msg.message);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "icon-btn delete-btn";
        deleteBtn.title = "Delete Message";
        deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
        deleteBtn.onclick = () => deleteMessage(msg.msg_id);

        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);
        bubble.appendChild(actions);
      }

      row.appendChild(bubble);
      chatMessages.appendChild(row);
    }

    async function loadMessages(forceScroll = false) {
      const chatMessages = document.getElementById("chatMessages");

      try {
        const wasNearBottom = isNearBottom();

        const res = await fetch(freshUrl("./loadMessages"), {
          cache: "no-store"
        });

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        const messages = await res.json();
        const currentJson = JSON.stringify(messages);
        const hasChanged = currentJson !== lastRenderedMessagesJson;
        const hasNewMessage = messages.length > lastMessageCount;

        if (!hasChanged) {
          return;
        }

        chatMessages.innerHTML = "";
        messages.forEach(msg => renderMessage(msg));

        if (forceScroll || wasNearBottom || hasNewMessage || lastMessageCount === 0) {
          scrollToBottom();
        }

        lastMessageCount = messages.length;
        lastRenderedMessagesJson = currentJson;
      } catch (err) {
        console.error(err);
      }
    }

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();

      if (!text) {
        alert("Message cannot be empty");
        input.focus();
        return;
      }

      const params = new URLSearchParams();
      params.append("message", text);

      try {
        const res = await fetch(freshUrl("./sendMessage"), {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString(),
          cache: "no-store"
        });

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        const data = await res.json();

        if (data.success) {
          input.value = "";
          clearTimeout(typingStopTimer);
          await updateTypingStatus(false);
          clearTypingIndicator();
          await heartbeat();
          await checkUserStatus();
          await loadMessages(true);
          scrollToBottom();
        } else {
          alert(data.message || "Message not saved");
        }
      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }

    async function editMessage(msgId, oldText) {
      const newText = prompt("Edit your message:", oldText);

      if (newText == null) return;
      if (newText.trim() === "") {
        alert("Message cannot be empty");
        return;
      }

      const params = new URLSearchParams();
      params.append("msg_id", msgId);
      params.append("message", newText.trim());

      try {
        const res = await fetch(freshUrl("./editMessage"), {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString(),
          cache: "no-store"
        });

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        const data = await res.json();

        if (data.success) {
          await heartbeat();
          await checkUserStatus();
          await loadMessages();
        } else {
          alert(data.message || "Edit failed");
        }
      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }

    async function deleteMessage(msgId) {
      const ok = confirm("Are you sure you want to delete this message?");
      if (!ok) return;

      const params = new URLSearchParams();
      params.append("msg_id", msgId);

      try {
        const res = await fetch(freshUrl("./deleteMessage"), {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString(),
          cache: "no-store"
        });

        if (res.status === 401) {
          window.location.href = "index.html";
          return;
        }

        const data = await res.json();

        if (data.success) {
          await heartbeat();
          await checkUserStatus();
          await loadMessages();
        } else {
          alert(data.message || "Delete failed");
        }
      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }

    async function logout() {
      try {
        clearTimeout(typingStopTimer);
        await updateTypingStatus(false);

        const res = await fetch(freshUrl("./logout"), {
          method: "POST",
          cache: "no-store"
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = "index.html";
        } else {
          alert("Logout failed");
        }
      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }

    function handleTypingEvent() {
      const input = document.getElementById("messageInput");
      const value = input.value.trim();

      clearTimeout(typingStopTimer);

      if (value.length > 0) {
        updateTypingStatus(true);

        typingStopTimer = setTimeout(() => {
          updateTypingStatus(false);
        }, 2000);
      } else {
        updateTypingStatus(false);
        clearTypingIndicator();
      }
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    }

    window.onload = async function () {
      const input = document.getElementById("messageInput");

      input.addEventListener("keydown", handleEnter);
      input.addEventListener("input", handleTypingEvent);
      input.addEventListener("blur", () => {
        clearTimeout(typingStopTimer);
        updateTypingStatus(false);
        clearTypingIndicator();
      });

      await fetchCurrentUser();
      await heartbeat();
      await loadMessages(true);
      await checkUserStatus();
      await pollTypingStatus();

      heartbeatTimer = setInterval(async () => {
        await heartbeat();
        await checkUserStatus();
      }, 3000);

      messageTimer = setInterval(() => loadMessages(false), 1000);
      statusTimer = setInterval(checkUserStatus, 3000);
      typingPollTimer = setInterval(pollTypingStatus, 1000);
    };

    window.addEventListener("beforeunload", function () {
      navigator.sendBeacon("./logout");
    });
  </script>
</body>
</html>
