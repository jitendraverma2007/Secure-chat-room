<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Account</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="chatTitle">CREATE ACCOUNT</h1>

  <form id="signupForm" class="signupForm" autocomplete="off">
    <h2 class="signupTitle">Sign Up</h2>

    <div class="inputGroup">
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" name="fullName" placeholder="Enter your full name" required>
    </div>

    <div class="inputGroup">
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" name="email" placeholder="email@domain.com" required>
    </div>

    <div class="inputGroup">
      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" name="password" placeholder="Create password" required>
    </div>

    <div class="inputGroup">
      <label for="signupConfirmPassword">Confirm Password</label>
      <input type="password" id="signupConfirmPassword" name="confirmPassword" placeholder="Confirm password" required>
    </div>

    <div class="inputGroup">
      <button type="submit">Create Account</button>
    </div>

    <div class="authLinks">
      <a href="index.html">Back to Login</a>
    </div>
  </form>

  <script src="script.js"></script>
</body>
</html>
